<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>Página no encontrada | Quiro Salud CDMX</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 20px;
    }
    .error-logo {
      width: 80px;
      margin: 0 auto 24px;
      opacity: 0.7;
    }
    .error-code {
      font-family: var(--f-head);
      font-size: clamp(5rem, 20vw, 8rem);
      font-weight: 900;
      color: rgba(212,175,55,0.15);
      line-height: 1;
      margin-bottom: 0;
      letter-spacing: -0.04em;
    }
    .error-title {
      font-family: var(--f-head);
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 900;
      text-transform: uppercase;
      color: var(--c-surface);
      margin-bottom: 12px;
    }
    .error-text {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.5);
      max-width: 420px;
      margin: 0 auto 32px;
      line-height: 1.65;
    }
    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .error-divider {
      width: 40px;
      height: 2px;
      background: var(--c-gold);
      margin: 16px auto 24px;
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <img src="logo-escudo.webp"
       alt="Quiro Salud CDMX"
       class="error-logo"
       width="80" height="80"
       loading="eager">

  <div class="error-code">404</div>

  <div class="error-divider"></div>

  <h1 class="error-title">Esta página no existe.</h1>

  <p class="error-text">
    El link que seguiste ya no está disponible o fue movido.<br>
    Pero tu columna sí merece atención — y estamos aquí.
  </p>

  <div class="error-actions">
    <a href="/" class="btn btn--primary">Volver al inicio</a>
    <a href="/servicios" class="btn btn--secondary">Ver servicios</a>
    <a href="https://wa.me/message/3QR6Q7MVVOGBN1"
       class="btn btn--ghost"
       target="_blank"
       rel="noopener noreferrer">
      Contactar por WhatsApp
    </a>
  </div>

  <p style="margin-top:40px; font-size:0.75rem; color:rgba(255,255,255,0.2);">
    <a href="/privacidad" style="color:rgba(255,255,255,0.2);">Privacidad</a> ·
    <a href="/cookies" style="color:rgba(255,255,255,0.2);">Cookies</a> ·
    <a href="/aviso-legal" style="color:rgba(255,255,255,0.2);">Aviso Legal</a>
  </p>

</body>
</html>
